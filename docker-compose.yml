services:
  app:
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build: ./server
    environment:
      - PORT=3000
      - DATABASE_URL=/data/game.db
      - FRONTEND_URL=http://localhost:8080
    volumes:
      - db_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db_data:
